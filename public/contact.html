<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv=""X-UA-Compatible" content="IE=edge">
        <title>Charity Gamble - contact</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">   
        <link href="/assets/css/style.css" rel="stylesheet">
        <script src="https://kit.fontawesome.com/7ee24494c8.js" crossorigin="anonymous"></script>
    </head>
    <body>
      <div class="desktop-sidebar">
    <div class="icon-group">
        <a href="#terminal" title="Terminal" aria-label="Terminal"><i class="fa-solid fa-terminal"></i></a>
        <span>Terminal</span>
    </div>
    <div class="icon-group">
        <a href="#" title="Home" aria-label="Home"><i class="fa-solid fa-folder-open"></i></a><br>
        <span>Home</span>
    </div>
    <div class="icon-group">
        <i class="fa-solid fa-shield-halved"></i><br>
        <span>Tools</span>
    </div>
        <div class="icon-group">
        <a href="/assets/cgambleresume.pdf" download="cgambleresume.pdf" class="icon-group" title="Download my Résumé" aria-label="Download my Résumé"><i class="fa-regular fa-file"></i></a><br>
        <span>Download Résumé</span>
    </div>
</div>
      <div class="crt-overlay"></div>
        <div id="terminal" class="terminal-container">
  <header class="terminal-bar">
  <div class="controls">
    <a href="#"><span class="dot red"></span></a>
    <span class="dot yellow"></span>
    <span class="dot green"></span>
  </div>
          <button class="accessibility-toggle" aria-label="Toggle CRT Effects">
  [ DISABLE_VISUAL_EFFECTS ]
</button>
  <div class="terminal-path">
  guest@cgambledev:~
  

  
  
    <a href="/projects/">projects</a> /
  

</div>
</header>
  <nav class="terminal-nav">
    <ul>
      <li><a href="/">[ <span class="cmd">cd</span> /home ]</a></li>
      <li><a href="/about/">[ whomai ]</a></li>
      <li><a href="/neofetch/">[ neofetch ]</a></li>
      <li><a href="/projects/">[ <span class="cmd">cd</span> /projects ]</a></li>
      <li><a href="/labs/">[ <span class="cmd">cd</span> /lab-notes ]</a></li>
      <li><a href="/contact/">[ <span class="cmd">cd</span> /contact ]</a></li>
    </ul>
  </nav>

  <main class="terminal-body">
    
    
<div class="terminal-contact">
  <p class="prompt">guest@cgambledev:~$ mail --to admin</p>
  
  <form name="contact" method="POST" data-netlify="true" action="/success">
    <div class="form-group">
      <label for="name">FROM:</label>
      <input type="text" id="name" name="name" placeholder="identity_required" required>
    </div>
    
    <div class="form-group">
      <label for="email">REPLY-TO:</label>
      <input type="email" id="email" name="_replyto" placeholder="email@address.com" required>
    </div>
    
    <div class="form-group">
      <label for="message">MESSAGE:</label>
      <textarea id="message" name="message" rows="5" placeholder="enter_payload_here..." required></textarea>
    </div>
    
    <button type="submit" class="btn-terminal">transmit_data</button>
  </form>
</div>
    <span class="cursor">█</span>
  </main>
</div>
<script src="/assets/js/stayHere.js"></script>
<script src="/assests/js/copyClipboard.js"></script>
<script src="/assets/js/safeMode.js"></script>
</body>
</html>
